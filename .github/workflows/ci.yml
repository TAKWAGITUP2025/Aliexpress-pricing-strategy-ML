# ─────────────────────────────────────────────────────────────────────────────
# CI — Runs on every push to `test` and on every PR targeting `stage` or `main`
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [test]
  pull_request:
    branches: [stage, main]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python setup ────────────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # ── Install dependencies ─────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      # ── Lint ─────────────────────────────────────────────────────────────────
      - name: Lint with flake8
        run: |
          # Treat syntax errors / undefined names as build failures
          flake8 notebooks/ tests/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          # Warn on style issues (non-blocking)
          flake8 notebooks/ tests/ \
            --count \
            --max-line-length=120 \
            --ignore=E501,W503,E302,E303,W291,W293 \
            --exit-zero \
            --statistics

      # ── Tests ────────────────────────────────────────────────────────────────
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov=notebooks --cov-report=term-missing

      # ── Upload coverage report (optional artefact) ───────────────────────────
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage
          retention-days: 7
