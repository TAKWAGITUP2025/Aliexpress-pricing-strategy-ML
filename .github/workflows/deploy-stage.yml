# ─────────────────────────────────────────────────────────────────────────────
# Deploy — Staging
# Triggers on every push to `stage`.  Runs full CI then builds & pushes the
# Docker image to GHCR tagged as `staging`, and deploys to the staging env.
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy – Staging

on:
  push:
    branches: [stage]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/aliexpress-pricing

jobs:
  # ── 1. Lint & test (same gates as CI) ──────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint (hard errors only)
        run: |
          flake8 notebooks/ tests/ \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 2. Build & push Docker image to GHCR ───────────────────────────────────
  build-and-push:
    name: Build & Push (staging)
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=staging
            type=sha,prefix=staging-

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to staging environment ───────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: staging
      # url: https://your-staging-url.example.com   # ← set your staging URL

    steps:
      - uses: actions/checkout@v4

      # ── Option A: Streamlit Community Cloud ─────────────────────────────────
      # Streamlit Community Cloud auto-deploys when you push to the configured
      # branch — no extra step needed.  Just point it at this `stage` branch
      # in the Streamlit Cloud dashboard.

      # ── Option B: Render / Railway / Fly.io ─────────────────────────────────
      # Uncomment and fill in the relevant deploy hook secret for your platform.
      #
      # - name: Trigger Render staging deploy
      #   run: curl -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}"
      #
      # - name: Deploy to Railway (staging)
      #   uses: bervProject/railway-deploy@v1.0.0
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: aliexpress-pricing-staging

      # ── Option C: Generic SSH deploy ────────────────────────────────────────
      # - name: SSH deploy
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.STAGING_HOST }}
      #     username: ${{ secrets.STAGING_USER }}
      #     key: ${{ secrets.STAGING_SSH_KEY }}
      #     script: |
      #       docker pull ghcr.io/${{ github.repository_owner }}/aliexpress-pricing:staging
      #       docker stop app-staging || true
      #       docker rm   app-staging || true
      #       docker run -d --name app-staging -p 8501:8501 \
      #         ghcr.io/${{ github.repository_owner }}/aliexpress-pricing:staging

      - name: Deployment placeholder
        run: |
          echo "✅ Docker image pushed: ${{ needs.build-and-push.outputs.image_tag }}"
          echo "👉 Configure your staging deployment in the step above."
