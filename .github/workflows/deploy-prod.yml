# ─────────────────────────────────────────────────────────────────────────────
# Deploy — Production
# Triggers on every push to `main`.  Runs full CI, builds & pushes the Docker
# image tagged `latest` + the exact git SHA, then deploys to production.
#
# The `production` GitHub Environment can be configured with required reviewers
# (Settings → Environments → production → Required reviewers) to enforce a
# manual approval gate before the deploy job runs.
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy – Production

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/aliexpress-pricing

jobs:
  # ── 1. Lint & test ──────────────────────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint (hard errors only)
        run: |
          flake8 notebooks/ tests/ \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 2. Build & push Docker image to GHCR ───────────────────────────────────
  build-and-push:
    name: Build & Push (production)
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=prod-
            type=semver,pattern={{version}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy to production (requires approval via GitHub Environment) ──────
  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
      # url: https://your-production-url.example.com   # ← set your prod URL

    steps:
      - uses: actions/checkout@v4

      # ── Option A: Streamlit Community Cloud ─────────────────────────────────
      # Streamlit Community Cloud auto-deploys on push to `main` — no extra
      # step needed. Point it at the `main` branch in the Streamlit dashboard.

      # ── Option B: Render / Railway / Fly.io ─────────────────────────────────
      # Uncomment and fill in the relevant deploy hook secret for your platform.
      #
      # - name: Trigger Render production deploy
      #   run: curl -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}"
      #
      # - name: Deploy to Railway (production)
      #   uses: bervProject/railway-deploy@v1.0.0
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: aliexpress-pricing-prod

      # ── Option C: Generic SSH deploy ────────────────────────────────────────
      # - name: SSH deploy to production
      #   uses: appleboy/ssh-action@v1.0.3
      #   with:
      #     host: ${{ secrets.PROD_HOST }}
      #     username: ${{ secrets.PROD_USER }}
      #     key: ${{ secrets.PROD_SSH_KEY }}
      #     script: |
      #       docker pull ghcr.io/${{ github.repository_owner }}/aliexpress-pricing:latest
      #       docker stop app-prod || true
      #       docker rm   app-prod || true
      #       docker run -d --name app-prod -p 8501:8501 \
      #         ghcr.io/${{ github.repository_owner }}/aliexpress-pricing:latest

      - name: Deployment placeholder
        run: |
          echo "✅ Docker image pushed: ${{ needs.build-and-push.outputs.image_tag }}"
          echo "🏷  Version: ${{ needs.build-and-push.outputs.version }}"
          echo "👉 Configure your production deployment in the step above."
